<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/photo_2026-01-02_16-03-59-removebg-preview.png">
    <title>Bezaw Super Admin | Multi-Theme Terminal ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
            font-size: 100%;
            /* Reset to default — zoom on #root handles everything */
        }

        #root {
            zoom: 0.72;
            height: calc(100vh / 0.72);
            width: calc(100vw / 0.72);
            overflow: hidden;
        }

        /* Portal modals render as body > div (outside #root), bypassing zoom.
           Apply the same zoom + compensate their dimensions so modals match the UI scale. */
        body>div:not(#root) {
            zoom: 0.72;
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw / 0.72);
            height: calc(100vh / 0.72);
            z-index: 9999;
            pointer-events: none;
            /* Let children handle events */
        }

        body>div:not(#root)>* {
            pointer-events: auto;
            /* Re-enable on actual modal content */
        }

        :root {
            /* Design Tokens */
            --bg-primary: #020617;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-input: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: rgba(255, 255, 255, 0.4);
            --transition-speed: 0.6s;
        }

        /* --- THEME DEFINITIONS --- */

        /* 1. BEZAW TERMINAL (Default) */
        body[data-theme='bezaw-terminal'][data-mode='dark'] {
            --bg-primary: #020617;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: rgba(255, 255, 255, 0.4);
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --bg-input: rgba(255, 255, 255, 0.05);
        }

        body[data-theme='bezaw-terminal'][data-mode='light'] {
            --bg-primary: #f8fafc;
            --accent: #059669;
            --accent-glow: rgba(5, 150, 105, 0.2);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --bg-card: #ffffff;
            --border-color: rgba(0, 0, 0, 0.06);
            --bg-input: #f1f5f9;
        }

        /* 2. NEO-RETAIL MINIMAL */
        body[data-theme='neo-retail'][data-mode='dark'] {
            --bg-primary: #0f172a;
            --accent: #84cc16;
            --accent-glow: rgba(132, 204, 22, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --bg-card: #1e293b;
            --border-color: rgba(255, 255, 255, 0.05);
            --bg-input: #334155;
        }

        body[data-theme='neo-retail'][data-mode='light'] {
            --bg-primary: #ffffff;
            --accent: #65a30d;
            --accent-glow: rgba(101, 163, 13, 0.1);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --bg-card: #f8fafc;
            --border-color: #e2e8f0;
            --bg-input: #f1f5f9;
        }

        /* 3. FRESH MARKET MODERN */
        body[data-theme='fresh-market'][data-mode='dark'] {
            --bg-primary: #064e3b;
            --accent: #6ee7b7;
            --accent-glow: rgba(110, 231, 183, 0.3);
            --text-primary: #ecfdf5;
            --text-secondary: #a7f3d0;
            --bg-card: rgba(2, 44, 34, 0.6);
            --border-color: rgba(110, 231, 183, 0.15);
            --bg-input: rgba(6, 78, 59, 0.8);
        }

        body[data-theme='fresh-market'][data-mode='light'] {
            --bg-primary: #f0fdf4;
            --accent: #166534;
            --accent-glow: rgba(22, 101, 52, 0.1);
            --text-primary: #064e3b;
            --text-secondary: #166534;
            --bg-card: #ffffff;
            --border-color: #dcfce7;
            --bg-input: #f0fdf4;
        }

        /* 4. SMART POS PRO */
        body[data-theme='smart-pos'][data-mode='dark'] {
            --bg-primary: #000000;
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --bg-card: #111111;
            --border-color: #222222;
            --bg-input: #1a1a1a;
        }

        body[data-theme='smart-pos'][data-mode='light'] {
            --bg-primary: #ffffff;
            --accent: #0891b2;
            --accent-glow: rgba(8, 145, 178, 0.1);
            --text-primary: #000000;
            --text-secondary: #666666;
            --bg-card: #fafafa;
            --border-color: #eeeeee;
            --bg-input: #f4f4f4;
        }

        /* 5. RETAIL INTELLIGENCE */
        body[data-theme='retail-intel'][data-mode='dark'] {
            --bg-primary: #1e1b4b;
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.3);
            --text-primary: #f5f3ff;
            --text-secondary: #c4b5fd;
            --bg-card: rgba(30, 27, 75, 0.8);
            --border-color: rgba(168, 85, 247, 0.2);
            --bg-input: #312e81;
        }

        body[data-theme='retail-intel'][data-mode='light'] {
            --bg-primary: #f5f3ff;
            --accent: #7e22ce;
            --accent-glow: rgba(126, 34, 206, 0.1);
            --text-primary: #1e1b4b;
            --text-secondary: #6d28d9;
            --bg-card: #ffffff;
            --border-color: #ddd6fe;
            --bg-input: #f3f0ff;
        }

        /* Global Styles */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1),
                color var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1,
        h2,
        h3,
        .font-poppins {
            font-family: 'Poppins', sans-serif;
        }

        .glass-card {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2rem;
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        .glass-input {
            border-radius: 1rem;
            transition: all 0.3s ease;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .glass-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            outline: none;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
            border-radius: 0.75rem;
            font-weight: 700;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px var(--accent-glow);
        }

        @keyframes orbit {
            0% {
                transform: rotate(0deg) translateX(80px) rotate(0deg);
            }

            100% {
                transform: rotate(360deg) translateX(80px) rotate(-360deg);
            }
        }

        .mesh-blob {
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            z-index: -1;
            transition: background-color var(--transition-speed) ease;
        }

        .blob-1 {
            background: var(--accent);
            top: -150px;
            left: -150px;
            animation: orbit 22s infinite linear;
        }

        .blob-2 {
            background: #3b82f6;
            bottom: -150px;
            right: -150px;
            animation: orbit 28s infinite linear reverse;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
    </style>
</head>

<body data-theme="bezaw-terminal" data-mode="dark">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
